    <!-- iOS Safari ignores manifest.json's display:"standalone" for Add to
         Home Screen — without these it launches back inside Safari chrome
         instead of as a standalone app. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <script>
      /* Some in-app browsers (a link opened inside a chat app) ignore the static
         viewport meta and lay the page out at ~980px desktop width, then shrink
         it to fit — making every phone render tiny. If the layout viewport is far
         wider than the physical screen, re-assert device-width so the real mobile
         layout engages. No-op on compliant browsers, tablets, and desktop. */
      (function () {
        function fixViewport() {
          try {
            var sw = (window.screen && window.screen.width) || 0;
            if (sw && sw <= 520 && window.innerWidth > sw + 80) {
              var m = document.querySelector('meta[name="viewport"]');
              if (m) m.setAttribute('content', 'width=' + sw + ', initial-scale=1, viewport-fit=cover');
            }
          } catch (e) {}
        }
        fixViewport();
        window.addEventListener('resize', fixViewport);
        window.addEventListener('orientationchange', fixViewport);
      })();
    </script>
    <script>
      /* The mobile nav dropdown is a card, not a full-screen overlay, so the
         hero behind it stays scrollable and its buttons stay tappable while
         the menu is open — two "Book a free call" CTAs live and clickable
         at once. Lock scroll off the burger's own aria-expanded state (the
         real open/closed signal) instead of any menu markup detail. */
      (function () {
        function apply(open) {
          document.documentElement.style.overflow = open ? 'hidden' : '';
          document.body.style.overflow = open ? 'hidden' : '';
        }
        new MutationObserver(function () {
          var btn = document.querySelector('.nav-burger[aria-expanded]');
          apply(!!btn && btn.getAttribute('aria-expanded') === 'true');
        }).observe(document.documentElement, {
          attributes: true,
          attributeFilter: ['aria-expanded'],
          subtree: true,
        });
      })();
    </script>

    <style>
      /* Skip-to-content link: keyboard/screen-reader users landing on a page
         with a fixed nav otherwise have to tab through every nav item before
         reaching real content. Visually hidden until focused, then docked
         top-left using the app's own token colors so it doesn't look bolted on. */
      .skip-link {
        position: fixed;
        top: -100px;
        left: 1rem;
        z-index: 100;
        padding: 0.6rem 1rem;
        background: hsl(var(--background, 224 44% 4%));
        color: hsl(var(--foreground, 213 100% 96%));
        border-radius: 4px;
        font-family: system-ui, sans-serif;
        font-size: 0.9rem;
        text-decoration: none;
        transition: top 0.2s ease;
      }
      .skip-link:focus-visible {
        top: 1rem;
        outline: 2px solid hsl(var(--ring, 38 89% 62%));
        outline-offset: 3px;
      }
    </style>
